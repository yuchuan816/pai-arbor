services:
  # 关系型数据库：用于未来 Prisma 存储用户对话历史、Agent 状态
  mysql:
    image: mysql:8
    container_name: ai_workflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    ports:
      - '3306:3306'
    volumes:
      - ./docker-volumes/mysql_data:/var/lib/mysql

  # 向量数据库：用于 RAG 存储规范文本的向量片段
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai_workflow_chroma
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./docker-volumes/chroma_data:/data

  # OSS
  minio:
    image: minio/minio:latest
    container_name: local-minio
    restart: unless-stopped
    ports:
      - '9000:9000' # API 端口（代码连接这个）
      - '9001:9001' # Web 管理后台端口
    environment:
      MINIO_ROOT_USER:  ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./docker-volumes/minio_data:/data
    command: server /data --console-address ":9001"
