services:
  # 关系型数据库：用于未来 Prisma 存储用户对话历史、Agent 状态
  mysql:
    image: mysql:8
    container_name: pai-arbor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
    ports:
      - '3306:3306'
    volumes:
      - ./docker-volumes/mysql-data:/var/lib/mysql

  # 向量数据库：用于 RAG 存储规范文本的向量片段
  chromadb:
    image: chromadb/chroma:latest
    container_name: pai-arbor-chroma
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./docker-volumes/chroma-data:/data

  # OSS
  minio:
    image: minio/minio:latest
    container_name: pai-arbor-minio
    restart: unless-stopped
    ports:
      - '9000:9000' # API 端口（代码连接这个）
      - '9001:9001' # Web 管理后台端口
    environment:
      MINIO_ROOT_USER:  ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./docker-volumes/minio-data:/data
    command: server /data --console-address ":9001"

  loki:
    image: grafana/loki:3.0.0
    container_name: pai-arbor-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./docker-volumes/loki-data:/loki

  grafana:
    image: grafana/grafana:11.3.0
    container_name: pai-arbor-grafana
    restart: unless-stopped
    depends_on:
      - loki
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./docker-volumes/grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
